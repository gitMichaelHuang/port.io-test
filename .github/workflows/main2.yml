name: Create GitHub Repository
on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: 'Repository name'
        required: true
        type: string
      visibility:
        description: 'Public repository'
        required: true
        type: boolean
      port_context:
        description: 'Port context'
        required: true
        type: string

jobs:
  create-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Log Port Context
        run: |
          echo "Port Context: ${{ github.event.inputs.port_context }}"
          echo "Run ID: ${{ fromJson(github.event.inputs.port_context).runId }}"
      
      - name: Create Repository
        id: create-repo
        run: |
          gh repo create ${{ github.event.inputs.repo_name }} \
            --${{ github.event.inputs.visibility == 'true' && 'public' || 'private' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
      
      - name: Report Success to Port
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ fromJson(github.event.inputs.port_context).runId }}
          status: "SUCCESS"
          logMessage: "✅ Successfully created repository ${{ github.event.inputs.repo_name }}"
      
      - name: Report Failure to Port
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.getport.io
          operation: PATCH_RUN
          runId: ${{ fromJson(github.event.inputs.port_context).runId }}
          status: "FAILURE"
          logMessage: "❌ Failed to create repository ${{ github.event.inputs.repo_name }}"

      - name: Comment on Jira Ticket
        if: success()
        env:
          JIRA_TICKET: ${{ fromJson(inputs.port_context).jiraTicket }}
        run: |
          curl -X POST \
            -H "Authorization: Basic ${{ secrets.JIRA_AUTH }}" \
            -H "Content-Type: application/json" \
            https://capgemini-team-iyictd6t.atlassian.net/rest/api/3/issue/${JIRA_TICKET}/comment \
            -d "{
              \"body\": {
                \"type\": \"doc\",
                \"version\": 1,
                \"content\": [
                  {
                    \"type\": \"paragraph\",
                    \"content\": [
                      {
                        \"type\": \"text\",
                        \"text\": \"✅ GitHub repository created successfully!\",
                        \"marks\": [{\"type\": \"strong\"}]
                      }
                    ]
                  },
                  {
                    \"type\": \"paragraph\",
                    \"content\": [
                      {
                        \"type\": \"text\",
                        \"text\": \"Repository URL: ${REPO_URL}\"
                      }
                    ]
                  }
                ]
              }
            }"
