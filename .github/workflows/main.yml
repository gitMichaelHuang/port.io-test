name: Create Repository via GitHub App

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "Name of the new repository"
        required: true
      private:
        description: "Make repo private? (true/false)"
        required: true
        default: "true"

jobs:
  create-repo:
    runs-on: ubuntu-latest

    steps:
      # 1. Generate a GitHub App Installation Access Token
      - id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: gitMichaelHuang

      # 2. Create the new repository via GitHub REST API
      - name: Create repository
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/orgs/gitMichaelHuang/repos \
            -d "{\"name\": \"${{ github.event.inputs.repo_name }}\", \"private\": ${{ github.event.inputs.private }}}"
