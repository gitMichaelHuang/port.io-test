name: Create GitHub Repository with Jira
on:
  workflow_dispatch:
    inputs:
      repo_name:
        required: true
        type: string
      repo_description:
        required: false
        type: string
      visibility:
        required: true
        type: string
      team:
        required: false
        type: string
      port_context:
        required: true
        type: string

jobs:
  create-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Log Inputs
        run: |
          echo "Creating repository: ${{ inputs.repo_name }}"
          echo "Visibility: ${{ inputs.visibility }}"
          echo "Team: ${{ inputs.team }}"

      - name: Create GitHub Repository
        id: create_repo
        run: |
          VISIBILITY="${{ inputs.visibility }}"
          PRIVATE="true"
          if [ "$VISIBILITY" == "public" ]; then
            PRIVATE="false"
          fi
          
          RESPONSE=$(curl -s -w "%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/orgs/gitMichaelHuang/repos \
            -d "{
              \"name\": \"${{ inputs.repo_name }}\",
              \"description\": \"${{ inputs.repo_description }}\",
              \"private\": $PRIVATE
            }")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "❌ Failed to create repository (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          fi
          
          REPO_URL=$(echo "$BODY" | jq -r '.html_url')
          echo "repo_url=$REPO_URL" >> $GITHUB_OUTPUT
          echo "✅ Repository created: $REPO_URL"

      - name: Update Port Run
        if: fromJson(inputs.port_context).runId != null && fromJson(inputs.port_context).runId != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          logMessage: |
            ✅ GitHub repository created successfully!
            🔗 Repository: ${{ steps.create_repo.outputs.repo_url }}
            📋 Jira Ticket: ${{ fromJson(inputs.port_context).jiraUrl }}

      - name: Comment on Jira Ticket
        env:
          JIRA_TICKET: ${{ fromJson(inputs.port_context).jiraTicket }}
          REPO_URL: ${{ steps.create_repo.outputs.repo_url }}
        run: |
          curl -X POST \
            -H "Authorization: Basic ${{ secrets.JIRA_AUTH }}" \
            -H "Content-Type: application/json" \
            https://capgemini-team-iyictd6t.atlassian.net/rest/api/3/issue/${JIRA_TICKET}/comment \
            -d "{
              \"body\": {
                \"type\": \"doc\",
                \"version\": 1,
                \"content\": [
                  {
                    \"type\": \"paragraph\",
                    \"content\": [
                      {
                        \"type\": \"text\",
                        \"text\": \"✅ GitHub repository created successfully!\",
                        \"marks\": [{\"type\": \"strong\"}]
                      }
                    ]
                  },
                  {
                    \"type\": \"paragraph\",
                    \"content\": [
                      {
                        \"type\": \"text\",
                        \"text\": \"Repository URL: \"
                      },
                      {
                        \"type\": \"text\",
                        \"text\": \"${REPO_URL}\",
                        \"marks\": [{\"type\": \"link\", \"attrs\": {\"href\": \"${REPO_URL}\"}}]
                      }
                    ]
                  },
                  {
                    \"type\": \"paragraph\",
                    \"content\": [
                      {
                        \"type\": \"text\",
                        \"text\": \"Created via Port automation.\"
                      }
                    ]
                  }
                ]
              }
            }"
